<script>
    function switchTab(num) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab')[num-1].classList.add('active');
        document.getElementById('tab'+num).classList.add('active');
    }

    function insertTag(areaId, start, end) {
        const area = document.getElementById(areaId);
        let s = area.selectionStart; let e = area.selectionEnd;
        area.focus();
        if (typeof s === 'number') area.setSelectionRange(s, e);
        const text = area.value.substring(s, e);
        const fullText = start + text + end;
        if (!document.execCommand('insertText', false, fullText)) {
            area.setRangeText(fullText, s, e, 'end');
        }
    }

    function getImageList(value) {
        return String(value || '').split(/\r?\n/).map(url => url.trim()).filter(Boolean);
    }

    function previewImage(id) {
        const urls = getImageList(document.getElementById('t'+id+'_img').value);
        const preview = document.getElementById('prev_'+id);
        if(urls.length){
            preview.innerHTML = urls.map((url, index) => `<img src="${url}" alt="Task ${id} image ${index + 1}" style="max-width:100%; height:auto; display:block; margin:10px auto; border:1px dashed #ccc; padding:5px;">`).join('');
            preview.style.display = 'block';
        } else {
            preview.innerHTML = '';
            preview.style.display = 'none';
        }
    }

    // --- AUTO-CONVERT PASTED IMAGES TO CODE ---
    document.addEventListener('paste', function(e) {
        const target = e.target;
        if (target.tagName !== 'INPUT' && target.tagName !== 'TEXTAREA') return;

        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        let blob = null;
        for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf("image") === 0) {
                blob = items[i].getAsFile();
                break;
            }
        }

        if (blob) {
            e.preventDefault();
            const reader = new FileReader();
            reader.onload = function(event) {
                const base64 = event.target.result;
                if (target.id === 't1_img') {
                    target.value = target.value ? target.value.trimEnd() + "\\n" + base64 : base64;
                    previewImage(1);
                } else {
                    const html = `<img src="${base64}" style="max-width:100%; height:auto; display:block; margin:10px auto;">`;
                    if (!document.execCommand("insertText", false, html)) {
                        target.setRangeText(html, target.selectionStart, target.selectionEnd, 'end');
                    }
                }
            };
            reader.readAsDataURL(blob);
        }
    });

        .platform-theme h2 { color: #1f2937 !important; }
        .platform-theme textarea.student-input {
            background: #fff !important;
            border: 1px solid rgba(102, 126, 234, 0.2) !important;

        }

        .platform-theme .modal-content {
            background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(248,250,255,0.95) 100%) !important;

            box-shadow: 0 25px 50px rgba(15, 23, 42, 0.2) !important;
            border-radius: 32px !important;
        }

        .notes-panel { position: fixed; top: 80px; right: 20px; width: 300px; height: 400px; background: #fff9c4; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-radius: 15px; z-index: 2000; padding: 15px; border: 1px solid #fbc02d; display: flex; flex-direction: column; transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .notes-panel.open { transform: translateX(0); }
        .notes-area { flex: 1; border: none; background: transparent; resize: none; outline: none; font-family: 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; }
        
        .word-count-box { text-align: right; font-weight: bold; color: #7f8c8d; font-size: 14px; margin-right: 5px; }
        .wc-good { color: #27ae60; } .wc-bad { color: #e74c3c; }

        /* FOOTER */
        .footer { position:fixed; bottom:0; width:100%; height:70px; background:#fff; border-top:1px solid #e1e4e8; display:flex; align-items:center; justify-content:space-between; padding:0 30px; z-index:1000; }
        .part-nav { display: flex; gap: 10px; }
        .part-btn { border:1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); padding:10px 20px; border-radius:25px; cursor:pointer; font-weight:600; color:#555; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .part-btn:hover { background: rgba(255,255,255,1); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); border-color: rgba(0,0,0,0.15); }
        .part-btn:active { transform: translateY(0); }
        .part-btn.active { background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); color:#fff; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 8px 20px rgba(44, 62, 80, 0.3); }
        .part-btn.active:hover { box-shadow: 0 12px 25px rgba(44, 62, 80, 0.4); border-color: rgba(255,255,255,0.4); }
        
        .check-btn { background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); color:white; border:1px solid rgba(255,255,255,0.2); padding:12px 30px; border-radius:30px; font-weight:bold; cursor:pointer; display: flex; align-items: center; gap: 8px; transition: all 0.3s ease; box-shadow: 0 8px 20px rgba(39, 174, 96, 0.3); backdrop-filter: blur(5px); }
        .check-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(39, 174, 96, 0.4); border-color: rgba(255,255,255,0.5); }
        .check-btn:active { transform: translateY(1px); box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3); }

        /* MODAL */
        .modal { display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background-color:rgba(0,0,0,0.6); align-items:center; justify-content:center; backdrop-filter:blur(8px); transition: opacity 0.3s; }
        .modal-content { background-color:#fff; padding:30px; border-radius:20px; width:85%; max-width:900px; height: 85vh; display: flex; flex-direction: column; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .modal-body { flex: 1; overflow-y: auto; padding: 20px; border: 1px solid #eee; margin: 15px 0; background: #f9f9f9; border-radius:10px; }
        .model-answer-block { margin-bottom: 30px; padding-bottom: 30px; border-bottom: 2px dashed #ccc; }
        .model-header { color: #8e44ad; margin-bottom: 10px; text-transform: uppercase; font-size: 14px; font-weight: bold; }
        
        /* AI & BUTTON STYLES */
        .ai-result { background: #e8f6f3; border-left: 5px solid #1abc9c; padding: 15px; margin-top: 15px; border-radius: 5px; }
        
        .err-container { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px dashed #ccc; }
        .err-quote { color: #c0392b; text-decoration: line-through; font-weight: bold; margin-right: 8px; }
        .err-fix { color: #27ae60; font-weight: bold; }
        .err-reason { display: block; margin-top: 4px; font-style: italic; color: #555; font-size: 0.95em; }
        
        /* Task Response Styles */
        .tr-box { background: #fff8e1; border-left: 4px solid #f1c40f; padding: 10px; margin-bottom: 15px; }
        .tr-title { font-weight: bold; color: #d35400; text-transform: uppercase; font-size: 12px; }

        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .download-btn { background: linear-gradient(135deg, #3498db 0%, #5dade2 100%); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: 600; margin-left: 5px; display: inline-flex; align-items: center; gap: 5px; font-size: 14px; transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3); backdrop-filter: blur(4px); }
        .download-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(52, 152, 219, 0.4); border-color: rgba(255,255,255,0.5); }
        .download-btn:active { transform: translateY(0); }
        .pdf-btn { background: linear-gradient(135deg, #e74c3c 0%, #ec7063 100%); box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3); } .pdf-btn:hover { box-shadow: 0 8px 20px rgba(231, 76, 60, 0.4); }
        .copy-btn { background: linear-gradient(135deg, #f1c40f 0%, #f4d03f 100%); color: #333; box-shadow: 0 5px 15px rgba(241, 196, 15, 0.3); } .copy-btn:hover { box-shadow: 0 8px 20px rgba(241, 196, 15, 0.4); }

        .hidden { display: none !important; }
        #printable-content { display: block; }
    </style>
</head>
<body>
    <div id="customAlert" class="custom-alert"></div>
    
    <div class="header">
        <div class="logo">
            IELTS Test
            <input type="text" id="studentName" class="name-input" placeholder="Student Name" oninput="saveName(); this.classList.remove('shake-active');">
        </div>
        <div class="header-right">
            <button class="part-btn" onclick="document.getElementById('notesPanel').classList.toggle('open')" style="margin-right:10px; padding:5px 15px; font-size:12px; background:#f1c40f; border-color:#f39c12; color:#333;">📝 Notes</button>
            <button class="part-btn theme-btn" onclick="toggleDarkMode(this)" style="margin-right:10px; padding:5px 15px; font-size:12px;">🌙 Dark Mode</button>
            <div class="timer" id="timerDisplay">60:00</div>
            <a href="https://t.me/SynergyacademyBukhara" target="_blank" class="synergy-logo">
                <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.223-.548.223l.188-2.85 5.18-4.68c.223-.198-.054-.306-.346-.109l-6.4 4.02-2.76-.86c-.6-.188-.612-.6.125-.892l10.782-4.156c.5-.187.943.114.785.832z"/></svg>
                Synergy Academy
            </a>
        </div>
    </div>

    <div id="notesPanel" class="notes-panel">
        <div style="font-weight:bold; color:#d35400; margin-bottom:10px; display:flex; justify-content:space-between;"><span>Planning Pad</span> <span style="cursor:pointer;" onclick="document.getElementById('notesPanel').classList.remove('open')">✖</span></div>
        <textarea class="notes-area" placeholder="Type your plan here... (Not graded)"></textarea>
    </div>

    <div class="main-container">
        <div class="prompt-panel" id="promptPanel">
            <div id="p_task1" class="task-card">
                <h2>Writing Task 1</h2>
                <hr style="margin: 15px 0; border:0; border-top:1px solid #eee;">
                ${task1ImagesHtml}
                <div class="instructions">${escape(t1p)}</div>
            </div>
            <div id="p_task2" class="task-card hidden">
                <h2>Writing Task 2</h2>
                <hr style="margin: 15px 0; border:0; border-top:1px solid #eee;">
                <div class="instructions">${escape(t2p)}</div>
            </div>
        </div>

        <div class="resizer" id="resizer"></div>

        <div class="writing-panel">
            <textarea id="input_task1" class="student-input" placeholder="Type your Task 1 response here..." oninput="updateCount(1)" onpaste="return false;"></textarea>
            <textarea id="input_task2" class="student-input hidden" placeholder="Type your Task 2 Essay here..." oninput="updateCount(2)" onpaste="return false;"></textarea>
            
            <div class="word-count-box">
                Words: <span id="wc_1">0</span> <span style="font-weight:normal; font-size:12px;">(Min: 150)</span>
            </div>
            <div class="word-count-box hidden" id="wc_box_2">
                Words: <span id="wc_2">0</span> <span style="font-weight:normal; font-size:12px;">(Min: 250)</span>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="part-nav">
            <button class="part-btn active" onclick="switchTask(1)">Task 1</button>
            <button class="part-btn" onclick="switchTask(2)">Task 2</button>
        </div>
        <button class="check-btn" onclick="submitTest()">Finish & Review</button>
    </div>

    <div id="resultModal" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2>Test Result</h2>
                <div>
                     <button class="download-btn copy-btn" onclick="copyEssays()">📋 Copy Text</button>
                     <button class="download-btn" onclick="downloadWord()">📄 Word (.doc)</button>
                     <button class="download-btn pdf-btn" onclick="downloadPDFDirect()">💾 Save as PDF</button>
                </div>
            </div>
            
            <div class="modal-body">
                <div id="ai_status" style="margin-bottom:20px; font-weight:bold; color:#2980b9;">
                    <div class="loader"></div> Analyzing your writing with AI...
                </div>
                
                <div id="ai_output" class="hidden"></div>

                <hr style="margin: 30px 0; border:0; border-top:1px solid #ccc;">

                <div id="printable-content">
                    <h3 style="color:#2c3e50; border-bottom:1px solid #eee; padding-bottom:10px;">Your Submission</h3>
                    <p><strong>Student:</strong> <span id="disp_name"></span></p>
                    <p><strong>Date:</strong> <span id="disp_date"></span></p>
                    <br>
                    <h4>Task 1 (<span id="final_wc1"></span> words)</h4>
                    <div id="view_t1" style="white-space: pre-wrap; font-family:'Georgia'; margin-bottom:20px;"></div>
                    <h4>Task 2 (<span id="final_wc2"></span> words)</h4>
                    <div id="view_t2" style="white-space: pre-wrap; font-family:'Georgia';"></div>
                </div>

                <div class="model-answer-block">
                    <h3>Band 9 Model Answer (Task 1):</h3>
                    <p>${escape(t1m) || "No model answer provided."}</p>
                </div>
                <div class="model-answer-block" style="border:none;">
                    <h3>Band 9 Model Answer (Task 2):</h3>
                    <p>${escape(t2m) || "No model answer provided."}</p>
                </div>
            </div>
            <div style="display:flex; justify-content: flex-end; align-items:center; padding-top:15px; border-top:1px solid #eee;">
                <button class="check-btn" onclick="document.getElementById('resultModal').style.display='none'">Close Review</button>
            </div>
        </div>
    </div>

<script>
    // Global variables
    var time = ${timeLimit * 60}; 
    var isSubmitted = false;
    var isTimeUpLocked = false;
    var currentTask = 1;
    var SESSION_ID = "${uniqueId}"; 
    var GROQ_API_KEY = "${API_KEY_PLACEHOLDER}"; 

    document.addEventListener('keydown', function(e) {
        if(e.ctrlKey && (e.key === 'u' || e.key === 'U')) { e.preventDefault(); return false; }
    }, true);
    document.addEventListener('contextmenu', function(event) { event.preventDefault(); });

    // Focus Tracking
    var switchCount = 0;
    window.addEventListener('blur', function() {
        if(!isSubmitted) {
            switchCount++;
            document.title = "⚠️ Tab Switched (" + switchCount + ")";
        }
    });

    // Resizer
    var resizer = document.getElementById('resizer'); 
    var leftSide = document.getElementById('promptPanel');
    if (resizer && leftSide) {
        resizer.addEventListener('mousedown', function(e) { 
            e.preventDefault(); 
            document.addEventListener('mousemove', resize); 
            document.addEventListener('mouseup', stopResize); 
        });
    }
    function resize(e) { 
        if (leftSide) {
            leftSide.style.flex = '0 0 ' + e.clientX + 'px'; 
        }
    }
    function stopResize() { 
        document.removeEventListener('mousemove', resize); 
    }

    function switchTask(num) {
        currentTask = num;
        var buttons = document.querySelectorAll('.footer .part-btn');
        buttons.forEach(function(b) { b.classList.remove('active'); });
        if (buttons[num-1]) buttons[num-1].classList.add('active');

        var pTask1 = document.getElementById('p_task1');
        var pTask2 = document.getElementById('p_task2');
        var inputTask1 = document.getElementById('input_task1');
        var inputTask2 = document.getElementById('input_task2');
        var wcBox1 = document.querySelector('.word-count-box');
        var wcBox2 = document.getElementById('wc_box_2');

        if(num === 1) {
            if (pTask1) pTask1.classList.remove('hidden');
            if (pTask2) pTask2.classList.add('hidden');
            if (inputTask1) inputTask1.classList.remove('hidden');
            if (inputTask2) inputTask2.classList.add('hidden');
            if (wcBox1) wcBox1.classList.remove('hidden');
            if (wcBox2) wcBox2.classList.add('hidden');
        } else {
            if (pTask1) pTask1.classList.add('hidden');
            if (pTask2) pTask2.classList.remove('hidden');
            if (inputTask1) inputTask1.classList.add('hidden');
            if (inputTask2) inputTask2.classList.remove('hidden');
            if (wcBox1) wcBox1.classList.add('hidden');
            if (wcBox2) wcBox2.classList.remove('hidden');
        }
    }

    function updateCount(taskNum) {
        var textArea = document.getElementById('input_task'+taskNum);
        if (!textArea) return;
        var text = textArea.value;
        var count = text.trim() === '' ? 0 : text.trim().split(/\\s+/).length;
        var disp = document.getElementById('wc_'+taskNum);
        if (!disp) return;
        disp.innerText = count;
        
        var min = taskNum === 1 ? 150 : 250;
        if(count >= min) { disp.className = 'wc-good'; } else { disp.className = 'wc-bad'; }
    }

    function saveName() {
        var nameInput = document.getElementById('studentName');
        if (nameInput && SESSION_ID) {
            try {
                localStorage.setItem(SESSION_ID + '_name', nameInput.value);
            } catch(e) {
                console.error('localStorage error:', e);
            }
        }
    }
    
    function showCustomAlert(message) {
        var alertBox = document.getElementById('customAlert');
        if (alertBox) {
            alertBox.innerText = message;
            alertBox.style.display = 'block';
            setTimeout(function() { alertBox.style.display = 'none'; }, 4500);
        }
    }
    
    function triggerNameWarning() {
        var nameInput = document.getElementById('studentName');
        if (!nameInput) return;
        nameInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
        
        nameInput.classList.remove('shake-active');
        void nameInput.offsetWidth; // Force reflow to restart animation
        nameInput.classList.add('shake-active');
        nameInput.focus();
    }

    async function checkWithAI(t1, t2) {
        if(!t1 && !t2) { document.getElementById('ai_status').innerHTML = "No text provided."; return; }

        const q1 = document.querySelector('#p_task1 .instructions').innerText;
        const q2 = document.querySelector('#p_task2 .instructions').innerText;

        const prompt = \`Role: Expert IELTS Examiner.
        
        --- TASK 1 ---
        QUESTION: "\${q1}"
        STUDENT ANSWER: "\${t1}"
        
        --- TASK 2 ---
        QUESTION: "\${q2}"
        STUDENT ANSWER: "\${t2}"
        
        Output an HTML report.
        
        SCORING & FEEDBACK RULES:
        1. **TASK RESPONSE CHECK:** Analyize if the student answered the SPECIFIC question asked.
           - Task 1: Did they summarize? Did they provide an Overview?
           - Task 2: Did they cover all parts (e.g. both views, or opinion)?
           - Format this as: <div class='tr-box'><div class='tr-title'>Task Response Check</div> ...feedback... </div>
        
        2. **ACCURACY:** Distinguish between "Advanced" and "Error". 
           - Respect formal academic words. Do NOT correct them.
           - Only correct actual grammatical or collocation errors.
        
        3. **HIGHLIGHTING:** Do not rewrite sentences. Use this format:
           <div class='err-container'>
              <span class='err-quote'>"Error"</span> &rarr; <span class='err-fix'>Correction</span>
              <span class='err-reason'>Reason: ...</span>
           </div>
           
        4. **LIST ALL ERRORS:** If there are 5 errors, list 5 errors.
        5. **SCORING:** Be realistic. Band 9 is possible for native-level perfection.
        \`;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": "Bearer " + GROQ_API_KEY, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "user", content: prompt }],
                    temperature: 0.3
                })
            });
            const data = await response.json();
            if(data.error) throw new Error(data.error.message);
            
            document.getElementById('ai_status').classList.add('hidden');
            const out = document.getElementById('ai_output');
            out.classList.remove('hidden');
            out.innerHTML = "<div class='ai-result'><h3>🤖 AI Evaluation</h3>" + data.choices[0].message.content + "</div>";
        } catch (err) {
            document.getElementById('ai_status').innerHTML = "<span style='color:red'>AI Error: " + err.message + "</span> <br><button class='check-btn' style='margin-top:10px; font-size:12px; padding:5px 15px;' onclick='retryAI()'>🔄 Retry</button>";
        }
    }

    function sendToTelegram(studentName, task1Text, task2Text, wc1, wc2) {
        const botToken = "8349045424:AAEmXXa818OHQYb9uU7u9BJt-JOyARCAKTs"; 
        const chatId = "-1003572167252"; 
        
        const safeT1 = task1Text ? task1Text : "No response provided.";
        const safeT2 = task2Text ? task2Text : "No response provided.";

        const message = "📝 *New IELTS Submission*\\n\\n" +
                        "*Student:* " + studentName + "\\n\\n" +
                        "*Task 1 (" + wc1 + " words):*\\n" + safeT1 + "\\n\\n" +
                        "*Task 2 (" + wc2 + " words):*\\n" + safeT2;

        const url = "https://api.telegram.org/bot" + botToken + "/sendMessage";
        
        fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                chat_id: chatId,
                text: message,
                parse_mode: "Markdown"
            })
        })
        .then(response => console.log("Successfully sent to Telegram!"))
        .catch(error => console.error("Error sending to Telegram:", error));
    }

    function checkTimeUp() {
        var nameInput = document.getElementById('studentName');
        if (!nameInput) return;
        var name = nameInput.value.trim();

        if (name) {
            submitTest();
        } else {
            if (!isTimeUpLocked) {
                 isTimeUpLocked = true;
                 var task1 = document.getElementById('input_task1');
                 var task2 = document.getElementById('input_task2');
                 if (task1) {
                     task1.disabled = true;
                     task1.readOnly = true;
                 }
                 if (task2) {
                     task2.disabled = true;
                     task2.readOnly = true;
                 }

                 showCustomAlert("Time is up! Please enter your name at the top, then click Finish.");
                 triggerNameWarning();
            }
        }
    }

    function submitTest() {
        var modal = document.getElementById('resultModal');
        if(isSubmitted) { 
            if (modal) modal.style.display = 'flex'; 
            return; 
        }
        
        var nameInput = document.getElementById('studentName');
        if (!nameInput) return;
        var name = nameInput.value.trim();

        if (!name) {
            showCustomAlert("Please enter your name at the top of the page before submitting.");
            triggerNameWarning();
            return;
        }
        nameInput.classList.remove('shake-active');
        
        if(time > 0 && !confirm("Finish test?")) return;
        
        isSubmitted = true;
        try {
            localStorage.setItem(SESSION_ID + '_submitted', 'true');
        } catch(e) {
            console.error('localStorage error:', e);
        }
        
        var task1 = document.getElementById('input_task1');
        var task2 = document.getElementById('input_task2');
        if (task1) {
            task1.disabled = true;
            task1.readOnly = true;
        }
        if (task2) {
            task2.disabled = true;
            task2.readOnly = true;
        }
        
        var t1 = task1 ? task1.value : '';
        var t2 = task2 ? task2.value : '';
        var wc1Elem = document.getElementById('wc_1');
        var wc2Elem = document.getElementById('wc_2');
        var wc1 = wc1Elem ? wc1Elem.innerText : '0';
        var wc2 = wc2Elem ? wc2Elem.innerText : '0';
        
        sendToTelegram(name, t1, t2, wc1, wc2);
        
        var finalWc1 = document.getElementById('final_wc1');
        var finalWc2 = document.getElementById('final_wc2');
        var dispName = document.getElementById('disp_name');
        var dispDate = document.getElementById('disp_date');
        var viewT1 = document.getElementById('view_t1');
        var viewT2 = document.getElementById('view_t2');
        
        if (finalWc1) finalWc1.innerText = wc1;
        if (finalWc2) finalWc2.innerText = wc2;
        if (dispName) dispName.innerText = name;
        if (dispDate) dispDate.innerText = new Date().toLocaleString();
        if (viewT1) viewT1.innerText = t1;
        if (viewT2) viewT2.innerText = t2;
        
        if (modal) modal.style.display = 'flex';
        checkWithAI(t1, t2);
    }

    function retryAI() {
        const t1 = document.getElementById('input_task1').value;
        const t2 = document.getElementById('input_task2').value;
        checkWithAI(t1, t2, true);
    }
    
    function toggleDarkMode(btn) {
        document.body.classList.toggle('dark-mode');
        if(document.body.classList.contains('dark-mode')) {
            if (btn) btn.innerText = "☀️ Light Mode";
        } else {
            if (btn) btn.innerText = "🌙 Dark Mode";
        }
    }

    function toggleSiteTheme() {
        document.body.classList.toggle('platform-theme');
        var btn = document.querySelector('.site-theme-btn');
        if(document.body.classList.contains('platform-theme')) {
            if (btn) {
                btn.innerText = "🏗️ Builder Theme";
                btn.style.background = "linear-gradient(135deg, #1f2937 0%, #334155 100%)";
            }
        } else {
            if (btn) {
                btn.innerText = "🎨 Platform Theme";
                btn.style.background = "";
            }
        }
        try {
            localStorage.setItem('platform_site_theme_writing', document.body.classList.contains('platform-theme') ? 'on' : 'off');
        } catch(e) {
            console.error('localStorage error:', e);
        }
    }

    // Load saved theme preference
    (function() {
        try {
            var savedTheme = localStorage.getItem('platform_site_theme_writing');
            if(savedTheme === 'on') {
                document.body.classList.add('platform-theme');
                var btn = document.querySelector('.site-theme-btn');
                if(btn) {
                    btn.innerText = "🏗️ Builder Theme";
                    btn.style.background = "linear-gradient(135deg, #1f2937 0%, #334155 100%)";
                }
            }
        } catch(e) {
            console.error('localStorage error:', e);
        }
    })();

    function downloadWord() {
        const name = document.getElementById('studentName').value || "Student";
        const t1 = document.getElementById('input_task1').value;
        const t2 = document.getElementById('input_task2').value;
        const ai = document.getElementById('ai_output').innerHTML;
        
        const htmlContent = \`
            <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
            <head><meta charset='utf-8'><title>IELTS Writing</title></head>
            <body>
                <h1>IELTS Writing Submission</h1>
                <p><b>Name:</b> \${name}</p>
                <p><b>Date:</b> \${new Date().toLocaleString()}</p>
                <hr>
                <h2>Task 1</h2>
                <p>\${t1.replace(/\\n/g, '<br>')}</p>
                <hr>
                <h2>Task 2</h2>
                <p>\${t2.replace(/\\n/g, '<br>')}</p>
                <hr>
                <h2>AI Feedback</h2>
                \${ai}
            </body></html>\`;
            
        const blob = new Blob([htmlContent], { type: 'application/msword' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = \`\${name}_IELTS_Writing.doc\`;
        link.click();
    }
    
    function downloadPDFDirect() {
        const element = document.getElementById('printable-content');
        const name = document.getElementById('studentName').value || "Student";
        
        const opt = {
          margin:       1,
          filename:     name + '_IELTS.pdf',
          image:        { type: 'jpeg', quality: 0.98 },
          html2canvas:  { scale: 2 },
          jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
    
    function copyEssays() {
        const t1 = document.getElementById('input_task1').value;
        const t2 = document.getElementById('input_task2').value;
        const text = "TASK 1:\\n" + t1 + "\\n\\nTASK 2:\\n" + t2;
        
        navigator.clipboard.writeText(text).then(() => {
            alert("Essays copied to clipboard!");
        }).catch(err => {
            alert("Failed to copy: " + err);
        });
    }

    setInterval(function() { 
        if(time > 0 && !isSubmitted) { 
            time--; 
            var m = Math.floor(time/60); 
            var s = time%60; 
            var timerDisplay = document.getElementById('timerDisplay');
            if (timerDisplay) {
                timerDisplay.innerText = (m<10?'0':'')+m + ":" + (s<10?'0':'')+s;
            }
            try {
                localStorage.setItem(SESSION_ID + '_timer', time);
                var task1 = document.getElementById('input_task1');
                var task2 = document.getElementById('input_task2');
                if (task1) localStorage.setItem(SESSION_ID + '_t1', task1.value);
                if (task2) localStorage.setItem(SESSION_ID + '_t2', task2.value);
            } catch(e) {
                console.error('localStorage error:', e);
            }
        } else if (time <= 0 && !isSubmitted) { 
            checkTimeUp(); 
        }
    }, 1000);

    // --- KEYSTROKE DYNAMICS TRACKER ---
    var keystrokes = { total: 0, pausesOver2Seconds: 0, lastKeyTime: null };

    var task2Input = document.getElementById('input_task2');
    if (task2Input) {
        task2Input.addEventListener('keydown', function() {
            var now = Date.now();
            if (keystrokes.lastKeyTime && (now - keystrokes.lastKeyTime > 2000)) {
                keystrokes.pausesOver2Seconds++;
            }
            keystrokes.total++;
            keystrokes.lastKeyTime = now;
        });
    }

    window.onload = function() {
        try {
            var savedTime = localStorage.getItem(SESSION_ID + '_timer');
            if(savedTime) time = parseInt(savedTime);
            
            var savedName = localStorage.getItem(SESSION_ID + '_name');
            var nameInput = document.getElementById('studentName');
            if(savedName && nameInput) nameInput.value = savedName;
            
            var savedT1 = localStorage.getItem(SESSION_ID + '_t1');
            var task1 = document.getElementById('input_task1');
            if(savedT1 && task1) { 
                task1.value = savedT1; 
                updateCount(1); 
            }
            
            var savedT2 = localStorage.getItem(SESSION_ID + '_t2');
            var task2 = document.getElementById('input_task2');
            if(savedT2 && task2) { 
                task2.value = savedT2; 
                updateCount(2); 
            }
            
            if(localStorage.getItem(SESSION_ID + '_submitted') === 'true') { 
                isSubmitted = true; 
                if (task1) {
                    task1.disabled = true;
                    task1.readOnly = true;
                }
                if (task2) {
                    task2.disabled = true;
                    task2.readOnly = true;
                }
                submitTest(); 
            }
        } catch(e) {
            console.error('localStorage error:', e);
        }
    }

    // Export functions to window for onclick handlers (must be at global scope)
    window.toggleDarkMode = toggleDarkMode;
    window.toggleSiteTheme = toggleSiteTheme;
    window.switchTask = switchTask;
    window.updateCount = updateCount;
    window.submitTest = submitTest;
    window.downloadWord = downloadWord;
    window.downloadPDFDirect = downloadPDFDirect;
    window.copyEssays = copyEssays;
    window.saveName = saveName;
    window.retryAI = retryAI;
    window.checkWithAI = checkWithAI;
