# ============================================================
# Fly.io Configuration — IELTS Testing Platform
# ============================================================
# Free tier: 3 VMs × 256 MB RAM = 768 MB total, no cold starts.
# Deploy:  fly deploy
# ============================================================

app = "ielts-platform"

primary_region = "iad"

[build]
  # Uses the Dockerfile (generated by fly launch or custom)
  # Fly auto-detects Python apps

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"

[env]
  APP_NAME = "IELTS Testing Platform"
  DEBUG = "false"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
