# Nginx configuration for test-platform on OCI VM
# Deploy to: /etc/nginx/sites-available/ielts-platform
# Enable with: sudo ln -s /etc/nginx/sites-available/ielts-platform /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name synergyacademy.duckdns.org;

    # Increase buffer for large responses (Oracle queries, exports)
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increased timeouts for Oracle DB queries
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Serve static files directly (better performance, offloads Node.js)
    location /public/ {
        alias /home/ubuntu/app/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
