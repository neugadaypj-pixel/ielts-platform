# ---- GitHub Actions: Deploy to Fly.io ----
# On push to fastapi branch: deploys to Fly.io free tier.
#
# Required GitHub Secrets:
#   FLY_API_TOKEN    - Fly.io deploy token (run: fly tokens create deploy)
#   MONGO_URI        - MongoDB Atlas connection string
#   JWT_SECRET_KEY   - JWT signing secret
#   SUPERADMIN_PASSWORD - SuperAdmin password

name: Deploy to Fly.io

on:
  push:
    branches: [fastapi]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set secrets for Fly.io
        run: |
          flyctl secrets set MONGO_URI="${{ secrets.MONGO_URI }}" \
                           JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
                           SUPERADMIN_PASSWORD="${{ secrets.SUPERADMIN_PASSWORD }}" \
                           --app ielts-platform
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
