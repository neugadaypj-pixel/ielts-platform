version: "3.9"

# ==============================================================
# Production Docker Compose — IELTS Testing Platform
# ==============================================================
# Includes: FastAPI app, MongoDB, Nginx, Uptime Kuma (monitoring)
# MongoDB port 27017 is NOT exposed to host (spec requirement)
# ==============================================================

services:
  # ---- MongoDB (No host port exposure) ----
  mongodb:
    image: mongo:7.0-jammy
    container_name: ielts_mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-backup.sh:/backup.sh:ro
    environment:
      MONGO_INITDB_DATABASE: ielts_platform
    networks:
      - ielts_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ---- FastAPI Application ----
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-org/ielts-platform}:latest
    container_name: ielts_app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - ielts_network
    healthcheck:
      test: curl -f http://localhost:8000/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ---- Nginx Reverse Proxy (with SSL) ----
  nginx:
    image: nginx:1.27-alpine
    container_name: ielts_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - ielts_network
    healthcheck:
      test: nginx -t || exit 1
      interval: 60s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ---- Uptime Kuma (Monitoring Dashboard) ----
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: ielts_uptime
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - ielts_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongodb_data:
    driver: local
  uptime_kuma_data:
    driver: local

networks:
  ielts_network:
    driver: bridge
